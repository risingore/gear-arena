<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>GEAR ARENA</title>
    <link rel="manifest" href="./manifest.json" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #fff;
        font-family: system-ui, sans-serif;
        overflow: hidden;
        height: 100%;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      #game-container {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game-container canvas {
        display: block;
        /* Use the browser's default smooth scaler. NEVER set
           image-rendering: pixelated / -webkit-optimize-contrast here —
           those force nearest-neighbor sampling and make Phaser text look
           jagged when the canvas is fitted to the viewport. */
        image-rendering: auto;
      }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }
    </script>
</body>
</html>
